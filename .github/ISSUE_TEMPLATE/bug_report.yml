name: Bug report
description: Report something that doesn't work as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as
        you can — the more concrete the report, the faster we can fix it.

        **Security issues:** please do NOT file them here. See
        [SECURITY.md](../../SECURITY.md) for the private reporting flow.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of what went wrong.
      placeholder: When I tap "Connect" on the Fleets screen, the app crashes immediately.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected the connection to open and the chat to become available.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps that consistently reproduce the bug.
      placeholder: |
        1. Open the app
        2. Tap "Add robot"
        3. ...
    validations:
      required: true

  - type: input
    id: scry-version
    attributes:
      label: Scry version
      description: |
        For the app: `Settings → About → Version`.
        For the connect: `scry-connect --version`.
      placeholder: app 0.1.2, connect 0.1.3
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Android app
        - scry-connect (Python server)
        - Both
        - Documentation
        - Other / unsure
    validations:
      required: true

  - type: input
    id: ros-distro
    attributes:
      label: ROS distro
      placeholder: jazzy / humble / rolling
    validations:
      required: false

  - type: input
    id: rmw
    attributes:
      label: RMW / DDS implementation
      placeholder: rmw_fastrtps_cpp, rmw_cyclonedds_cpp, etc.
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS / Android version
      placeholder: Ubuntu 24.04 LTS, Android 14
    validations:
      required: false

  - type: dropdown
    id: ai-provider
    attributes:
      label: AI provider (if app-related)
      options:
        - Claude
        - OpenAI
        - Gemini
        - Ollama
        - N/A
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: |
        For the connect: paste from `journalctl -u scry-connect` or
        `docker logs <container>`.
        For the app: `adb logcat -s scry-ai:* scry-mcp:*`.
        Drop screenshots directly into this box.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: confirms
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues and didn't find a duplicate
          required: true
        - label: I have read the [Contributing Guide](../../CONTRIBUTING.md)
          required: false
